- name: monogdb-setup
  hosts: mongodb
  become: true
  tasks: 
    - name: copy mongo repo 
      ansible.builtin.copy: 
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo
      
    - name: install mongodb server
      ansible.builtin.dnf:
        name: mongodb-org 
        state: present
    
    - name: change the port binding 
      ansible.builtin.replace: 
        path: /etc/mongod.conf
        regexp: "127.0.0.1"
        replace: "0.0.0.0"
        
    - name: enable and start mongd service 
      ansible.builtin.service:
        name: mongod
        enabled: true
        state: started
