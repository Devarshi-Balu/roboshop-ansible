- hosts: localhost
  vars: 
    var1: variable-1
    var2: variable-2
    var3: variable-3
    packages: 
      - nginx 
      - curl 
      - git
  become: true
  tasks: 
    - name: install nginx 
      apt: 
        name: nginx
        state: present
    - name: install packages
      apt: 
        name: "{{ item  }}"
        state: present
      loop: 
        - nginx 
        - curl 
        - git

